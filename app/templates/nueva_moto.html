<h1>Nueva Moto</h1>

<form method="POST">
<input name="marca" placeholder="Marca"><br>
<input name="modelo" placeholder="Modelo"><br>
<input name="placa" placeholder="Placa"><br>

<select name="cliente_id">
{% for c in clientes %}
<option value="{{ c.id }}">{{ c.nombre }}</option>
{% endfor %}
</select>

<button>Guardar</button>
</form>
